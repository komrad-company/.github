name: "Five-Year Plan — Maintenance"
description: Report a maintenance task — dependencies, CI, configuration
title: "[CHORE] "
labels: ["Five-Year Plan"]
assignees: []
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What needs updating — dependency, CI pipeline, configuration, tooling?
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why is this maintenance necessary? Security update, version EOL, broken pipeline?
    validations:
      required: true
