name: "Comrade's Mishap"
description: Report a defect to the collective
title: "[BUG] "
labels: ["Comrade's Mishap"]
assignees: []
body:
  - type: textarea
    id: incident
    attributes:
      label: Incident Report
      description: What is the bug? How is it triggered?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: crate_version
    attributes:
      label: Crate version
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust version
      placeholder: "rustc --version"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
    validations:
      required: false
