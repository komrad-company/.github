name: "Comrade's Mishap"
description: Report a defect to the collective
title: "[BUG] "
labels: ["Comrade's Mishap"]
assignees: []
body:
  - type: textarea
    id: incident
    attributes:
      label: Incident Report
      description: What is the bug? How is it triggered?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: Error Output
      description: Exact error message, stack trace, or log output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Minimal code snippet or configuration that reliably triggers the bug.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "v1.2.3"
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Ubuntu 24.04 — rustc 1.94 / Node 22 / Python 3.12 / …"
    validations:
      required: false
